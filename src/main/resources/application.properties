spring.application.name=job-tracker

# PostgreSQL
spring.datasource.url=${env.DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${env.DB_USERNAME:postgres}
spring.datasource.password=${env.DB_PASSWORD:1234}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${env.JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-chars}
app.jwt.expiration-ms=86400000

# AWS S3
aws.s3.bucket-name=job-tracker-001
aws.s3.region=us-east-1
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Scheduler
spring.task.scheduling.pool.size=2

# SES
aws.ses.from-email=${SES_FROM_EMAIL:eruffesraja468@gmail.com}
